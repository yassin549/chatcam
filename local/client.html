<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RTSP ? WebRTC Viewer</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; background: #111; color: #eee; }
    video { width: 100%; max-width: 960px; background: #000; border: 1px solid #333; }
    .status { margin: 12px 0; font-size: 14px; color: #9ad; }
  </style>
</head>
<body>
  <h1>RTSP ? WebRTC Viewer</h1>
  <div class="status" id="status">Connecting...</div>
  <video id="video" autoplay playsinline controls></video>

  <script>
    (async () => {
      const statusEl = document.getElementById('status');
      const video = document.getElementById('video');

      const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${wsProtocol}://${location.host}/ws`);

      const pc = new RTCPeerConnection({
        iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
      });

      pc.addTransceiver('video', { direction: 'recvonly' });

      pc.ontrack = (event) => {
        const stream = (event.streams && event.streams[0])
          ? event.streams[0]
          : new MediaStream([event.track]);
        video.srcObject = stream;
        statusEl.textContent = 'Streaming';
      };

      pc.onconnectionstatechange = () => {
        statusEl.textContent = `Connection: ${pc.connectionState}`;
      };

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          ws.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
        }
      };

      ws.onmessage = async (message) => {
        const data = JSON.parse(message.data);
        if (data.type === 'answer') {
          await pc.setRemoteDescription({ type: 'answer', sdp: data.sdp });
        } else if (data.type === 'candidate' && data.candidate) {
          await pc.addIceCandidate(data.candidate);
        }
      };

      ws.onopen = async () => {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        ws.send(JSON.stringify({ type: 'offer', sdp: pc.localDescription.sdp }));
      };

      ws.onclose = () => {
        statusEl.textContent = 'Disconnected';
      };

      ws.onerror = () => {
        statusEl.textContent = 'WebSocket error';
      };
    })();
  </script>
</body>
</html>
